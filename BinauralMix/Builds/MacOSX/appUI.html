<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spatial Renderer UI</title>

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #111;
            color: #ddd;
            font-family: Arial, sans-serif;
        }

        #app {
            display: grid;
            grid-template-columns: 280px minmax(420px, 1fr) 260px;
            grid-template-rows: 64px minmax(300px, 1fr) 170px;
            width: 100vw;
            height: 100vh;
            background: #161616;
        }

        .header {
            grid-column: 1 / 4;
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 0 24px;
            background: #1f1f1f;
            border-bottom: 1px solid #333;
        }

        .logo {
            margin-right: 12px;
            color: #fff;
            font-size: 21px;
            font-weight: 700;
        }

        .logo span {
            color: #8cff38;
        }

        .tab {
            padding: 8px 14px;
            background: #2b2b2b;
            border: 1px solid #3d3d3d;
            color: #ddd;
            font-size: 13px;
        }

        .left {
            grid-row: 2 / 4;
            display: flex;
            min-height: 0;
            flex-direction: column;
            overflow: hidden;
            background: #141414;
            border-right: 1px solid #333;
        }

        .section-title {
            padding: 12px 16px;
            border-bottom: 1px solid #303030;
            color: #aaa;
            font-size: 12px;
            text-transform: uppercase;
        }

        .object-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 9px;
            padding: 16px;
        }

        .object-dot {
            width: 30px;
            height: 30px;
            justify-self: center;
            border: 2px solid #28626b;
            border-radius: 50%;
            background: radial-gradient(
                circle at 35% 30%,
                #8cff38,
                #159c28 45%,
                #103f18 80%
            );
            box-shadow: 0 0 10px rgba(70, 255, 40, 0.35);
        }

        .track-list {
            min-height: 0;
            overflow-y: auto;
            border-top: 1px solid #303030;
        }

        .track {
            display: grid;
            grid-template-columns: 6px 1fr 38px;
            align-items: center;
            height: 38px;
            border-bottom: 1px solid #2c2c2c;
            font-size: 12px;
        }

        .track-color {
            width: 6px;
            height: 100%;
        }

        .track-name {
            padding-left: 10px;
        }

        .track-meter {
            height: 22px;
            margin-right: 8px;
            background: linear-gradient(to top, #24e329 70%, #182818 70%);
        }

        .center {
            position: relative;
            min-width: 0;
            min-height: 0;
            overflow: hidden;
            background: #181818;
        }

        #three {
            display: block;
            width: 100%;
            height: 100%;
        }

        .view-controls {
            position: absolute;
            bottom: 18px;
            left: 18px;
            display: flex;
            gap: 8px;
        }

        button {
            padding: 7px 12px;
            background: #2b2b2b;
            border: 1px solid #444;
            color: #ddd;
            font-size: 12px;
            cursor: pointer;
        }

        button.active {
            background: #168de2;
            color: #fff;
        }

        .right {
            display: grid;
            grid-template-rows: 1fr 170px;
            min-height: 0;
            background: #121212;
            border-left: 1px solid #333;
        }

        .speaker-panel {
            position: relative;
            border-bottom: 1px solid #333;
        }

        .speaker {
            position: absolute;
            top: 35px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #7dff36;
            box-shadow: 0 0 12px #4cff20;
        }

        .speaker.left {
            left: 50px;
        }

        .speaker.right {
            right: 50px;
        }

        .master-meter {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 12px;
            padding-bottom: 20px;
        }

        .db-scale {
            color: #888;
            font-size: 10px;
            line-height: 1.45;
        }

        .meter {
            display: flex;
            align-items: flex-end;
            width: 24px;
            height: 130px;
            background: #222;
            border: 1px solid #333;
        }

        .meter-fill {
            width: 100%;
            height: 72%;
            background: linear-gradient(to top, #2cff2c, #8cff38);
        }

        .timeline {
            position: relative;
            grid-column: 2 / 3;
            grid-row: 3;
            overflow: hidden;
            background: #252525;
            border-top: 1px solid #3a3a3a;
        }

        .clip {
            position: absolute;
            height: 26px;
            padding-left: 6px;
            overflow: hidden;
            background: #7130a8;
            border: 1px solid #9854d8;
            color: #fff;
            font-size: 11px;
            line-height: 24px;
            white-space: nowrap;
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
            }
        }
    </script>
</head>

<body>
    <div id="app">
        <header class="header">
            <div class="logo">Spatial<span>Mix</span></div>
            <div class="tab">Monitoring: Binaural</div>
            <div class="tab">I/O</div>
            <div class="tab">Trim &amp; Downmix</div>
            <div class="tab">Beds / Objects</div>
        </header>

        <aside class="left">
            <div class="section-title">Objects and Beds</div>
            <div class="object-grid" id="objectGrid"></div>

            <div class="section-title">Tracks</div>
            <div class="track-list" id="trackList"></div>
        </aside>

        <main class="center">
            <canvas id="three"></canvas>

            <div class="view-controls">
                <button type="button" class="active" data-view="free">Free</button>
                <button type="button" data-view="top">Top</button>
                <button type="button" data-view="rear">Rear</button>
            </div>
        </main>

        <aside class="right">
            <div class="speaker-panel">
                <div class="speaker left"></div>
                <div class="speaker right"></div>
            </div>

            <div class="master-meter">
                <div class="db-scale">
                    0<br>2<br>4<br>6<br>8<br>10<br>12<br>18<br>24<br>30<br>36<br>40
                </div>

                <div class="meter">
                    <div class="meter-fill"></div>
                </div>
            </div>
        </aside>

        <div class="timeline" id="timeline"></div>
    </div>

    <script type="module">
        import * as THREE from "three";
        import { OrbitControls } from "three/addons/controls/OrbitControls.js";

        const objectGrid = document.getElementById("objectGrid");

        for (let i = 0; i < 50; i += 1) {
            const dot = document.createElement("div");
            dot.className = "object-dot";
            dot.style.opacity = Math.random() > 0.25 ? "1" : "0.35";
            objectGrid.appendChild(dot);
        }

        const tracks = [
            ["Top Telephone", "#29c9c2"],
            ["Kick Ring", "#31c982"],
            ["Whoosh", "#3dd889"],
            ["Granular FX", "#27aa74"],
            ["Bass", "#d56a35"],
            ["Reesey Bass", "#ce7830"],
            ["Leads", "#8842e5"],
            ["Synth Lead FX", "#7f37d9"]
        ];

        const trackList = document.getElementById("trackList");

        tracks.forEach(([name, color]) => {
            const row = document.createElement("div");
            row.className = "track";
            row.innerHTML = `
                <div class="track-color" style="background: ${color}"></div>
                <div class="track-name">${name}</div>
                <div class="track-meter"></div>
            `;
            trackList.appendChild(row);
        });

        const timeline = document.getElementById("timeline");

        for (let i = 0; i < 9; i += 1) {
            const clip = document.createElement("div");
            clip.className = "clip";
            clip.textContent = "Hisham";
            clip.style.left = `${90 + i * 95}px`;
            clip.style.top = `${34 + (i % 2) * 36}px`;
            clip.style.width = `${70 + Math.random() * 50}px`;
            timeline.appendChild(clip);
        }

        const canvas = document.getElementById("three");
        const renderer = new THREE.WebGLRenderer({
            canvas,
            antialias: true,
            alpha: false
        });

        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x181818);

        const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
        camera.position.set(6, 4.5, 7);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 1.4, 0);

        const roomSize = {
            x: 6,
            y: 3.2,
            z: 4
        };

        const roomGeometry = new THREE.BoxGeometry(
            roomSize.x,
            roomSize.y,
            roomSize.z
        );

        const roomMaterial = new THREE.MeshBasicMaterial({
            color: 0x8ca7a2,
            transparent: true,
            opacity: 0.18,
            side: THREE.BackSide,
            depthWrite: false
        });

        const room = new THREE.Mesh(roomGeometry, roomMaterial);
        room.position.y = roomSize.y / 2;
        scene.add(room);

        const edges = new THREE.EdgesGeometry(roomGeometry);
        const edgeMaterial = new THREE.LineBasicMaterial({
            color: 0x56706e,
            transparent: true,
            opacity: 0.9
        });

        const wireframe = new THREE.LineSegments(edges, edgeMaterial);
        wireframe.position.copy(room.position);
        scene.add(wireframe);

        const grid = new THREE.GridHelper(6, 6, 0x425957, 0x2b3534);
        grid.position.y = 0.01;
        scene.add(grid);

        const listener = new THREE.Mesh(
            new THREE.SphereGeometry(0.22, 32, 32),
            new THREE.MeshStandardMaterial({
                color: 0xffff00,
                roughness: 0.25,
                metalness: 0.1,
                emissiveIntensity: 1.5
            })
        );

        listener.position.set(0, 1.1, 0);
        scene.add(listener);

        const objectMaterial = new THREE.MeshStandardMaterial({
            color: 0x3cff26,
            emissive: 0x127a14,
            roughness: 0.35
        });

        const inactiveMaterial = new THREE.MeshStandardMaterial({
            color: 0xb9b9b9,
            emissive: 0x111111,
            roughness: 0.5
        });

        const objects = [];

        function makeLabel(text) {
            const labelCanvas = document.createElement("canvas");
            labelCanvas.width = 128;
            labelCanvas.height = 64;

            const context = labelCanvas.getContext("2d");
            context.clearRect(0, 0, labelCanvas.width, labelCanvas.height);
            context.fillStyle = "#d8d8d8";
            context.font = "28px Arial";
            context.textAlign = "center";
            context.fillText(text, 64, 38);

            const texture = new THREE.CanvasTexture(labelCanvas);
            const material = new THREE.SpriteMaterial({
                map: texture,
                transparent: true,
                depthTest: false
            });

            const sprite = new THREE.Sprite(material);
            sprite.scale.set(0.42, 0.21, 1);
            return sprite;
        }

        const listenerLabel = makeLabel("You");
        listenerLabel.position.set(0, 1.55, 0);
        scene.add(listenerLabel);

        for (let i = 0; i < 24; i += 1) {
            const active = Math.random() > 0.18;
            const baseY = THREE.MathUtils.randFloat(0.35, roomSize.y * 0.9);

            const sphere = new THREE.Mesh(
                new THREE.SphereGeometry(active ? 0.14 : 0.11, 24, 24),
                active ? objectMaterial : inactiveMaterial
            );

            sphere.position.set(
                THREE.MathUtils.randFloatSpread(roomSize.x * 0.85),
                baseY,
                THREE.MathUtils.randFloatSpread(roomSize.z * 0.85)
            );

            sphere.userData.baseY = baseY;
            sphere.userData.phase = Math.random() * Math.PI * 2;

            const label = makeLabel(String(i + 11));
            label.position.copy(sphere.position);
            label.position.y -= 0.28;
            sphere.userData.label = label;

            objects.push(sphere);
            scene.add(sphere);
            scene.add(label);
        }

        const pointLight = new THREE.PointLight(0xffffff, 1.2);
        pointLight.position.set(2, 5, 4);
        scene.add(pointLight);

        scene.add(new THREE.AmbientLight(0x667777, 1.5));

        function resizeRenderer() {
            const width = Math.max(canvas.clientWidth, 1);
            const height = Math.max(canvas.clientHeight, 1);
            const pixelRatio = renderer.getPixelRatio();
            const targetWidth = Math.floor(width * pixelRatio);
            const targetHeight = Math.floor(height * pixelRatio);

            if (
                canvas.width !== targetWidth ||
                canvas.height !== targetHeight
            ) {
                renderer.setSize(width, height, false);
                camera.aspect = width / height;
                camera.updateProjectionMatrix();
            }
        }

        document.querySelectorAll("[data-view]").forEach((button) => {
            button.addEventListener("click", () => {
                document.querySelectorAll("[data-view]").forEach((item) => {
                    item.classList.remove("active");
                });

                button.classList.add("active");

                if (button.dataset.view === "top") {
                    camera.position.set(0, 8, 0.01);
                } else if (button.dataset.view === "rear") {
                    camera.position.set(0, 2.5, -8);
                } else {
                    camera.position.set(6, 4.5, 7);
                }

                controls.target.set(0, 1.4, 0);
                controls.update();
            });
        });

        function animate(time) {
            resizeRenderer();

            objects.forEach((object) => {
                const phase = time * 0.001 + object.userData.phase;
                object.position.y =
                    object.userData.baseY + Math.sin(phase) * 0.03;

                object.userData.label.position.copy(object.position);
                object.userData.label.position.y -= 0.28;
            });

            controls.update();
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);
    </script>
</body>
</html>
